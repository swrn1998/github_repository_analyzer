version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gh-analyzer-api:latest
    container_name: gh-analyzer-api
    ports:
      - "8080:8080"
    environment:
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN:-}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-10}
      - CACHE_STALE_TTL_MINUTES=${CACHE_STALE_TTL_MINUTES:-60}
      - CACHE_MAX_ENTRIES=${CACHE_MAX_ENTRIES:-500}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - github-analyzer-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=/api
    image: gh-analyzer-ui:latest
    container_name: gh-analyzer-ui
    ports:
      - "3000:80"
    volumes:
      # Override nginx.conf for local development
      - ./frontend/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - github-analyzer-net
    restart: unless-stopped

networks:
  github-analyzer-net:
    driver: bridge
    name: github-analyzer-net
