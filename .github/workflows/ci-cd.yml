name: CI-CD

on:
  push:
    branches: [ main ]

env:
  ACR_LOGIN_SERVER: githubanalyzeracr.azurecr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- BACKEND: test + build ----------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      
      - name: Build backend (skip tests)
        run: mvn -B clean package -DskipTests --file backend/pom.xml


      # ---------- Log in to ACR ----------
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ---------- Build & push BACKEND image ----------
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/gh-analyzer-api:latest

      # ---------- Build & push FRONTEND image ----------
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/gh-analyzer-ui:latest

      # ---------- Deploy BACKEND ----------
      - name: Deploy backend web app
        uses: azure/webapps-deploy@v3
        with:
          app-name: github-analyzer-api-niksoni
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          images: ${{ env.ACR_LOGIN_SERVER }}/gh-analyzer-api:latest

      # ---------- Deploy FRONTEND ----------
      - name: Deploy frontend web app
        uses: azure/webapps-deploy@v3
        with:
          app-name: github-analyzer-ui-niksoni
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_UI }}
          images: ${{ env.ACR_LOGIN_SERVER }}/gh-analyzer-ui:latest